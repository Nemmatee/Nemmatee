<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="340" viewBox="0 0 1200 340" font-family="'Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <clipPath id="r"><rect width="1200" height="340" rx="18"/></clipPath>

    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a1428"/>
      <stop offset="0.45" stop-color="#0d2740"/>
      <stop offset="0.72" stop-color="#123a57"/>
      <stop offset="1" stop-color="#0b2135"/>
    </linearGradient>
    <radialGradient id="moon" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#fbf3d6"/>
      <stop offset="0.7" stop-color="#f2e2a8"/>
      <stop offset="1" stop-color="#e9d488"/>
    </radialGradient>
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#f4e4b0" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#f4e4b0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0e2c44"/>
      <stop offset="1" stop-color="#071726"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f4d67e"/><stop offset="1" stop-color="#cf9f2e"/>
    </linearGradient>
    <filter id="sh" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <g clip-path="url(#r)">
    <!-- sky -->
    <rect width="1200" height="340" fill="url(#sky)"/>

    <!-- stars -->
    <g fill="#ffffff">
      <circle cx="120" cy="46" r="1.3" opacity="0.7"/>
      <circle cx="240" cy="30" r="1" opacity="0.5"/>
      <circle cx="360" cy="60" r="1.4" opacity="0.8"/>
      <circle cx="470" cy="34" r="1" opacity="0.5"/>
      <circle cx="560" cy="70" r="1.2" opacity="0.6"/>
      <circle cx="690" cy="40" r="1" opacity="0.5"/>
      <circle cx="150" cy="110" r="1.1" opacity="0.55"/>
      <circle cx="300" cy="128" r="1" opacity="0.45"/>
      <circle cx="620" cy="120" r="1.2" opacity="0.6"/>
      <circle cx="1130" cy="42" r="1.2" opacity="0.6"/>
      <circle cx="1050" cy="30" r="1" opacity="0.5"/>
      <circle cx="820" cy="26" r="1.1" opacity="0.55"/>
    </g>

    <!-- moon + glow -->
    <circle cx="988" cy="120" r="150" fill="url(#moonGlow)"/>
    <circle cx="988" cy="118" r="82" fill="url(#moon)"/>
    <g fill="#e4cf82" opacity="0.55">
      <circle cx="964" cy="98" r="10"/>
      <circle cx="1012" cy="128" r="14"/>
      <circle cx="980" cy="146" r="7"/>
      <circle cx="1006" cy="92" r="6"/>
    </g>

    <!-- ===== log-pose route: islands connected across the sky ===== -->
    <g stroke="url(#gold)" stroke-opacity="0.5" stroke-width="1.6" stroke-dasharray="2 7" stroke-linecap="round" fill="none">
      <path d="M735,150 Q800,90 872,116"/>
      <path d="M872,116 Q930,60 1064,70"/>
      <path d="M735,150 Q770,215 862,205"/>
      <path d="M862,205 Q960,235 1096,196"/>
      <path d="M1064,70 Q1120,130 1096,196"/>
    </g>
    <g fill="url(#gold)" filter="url(#sh)">
      <circle cx="735" cy="150" r="6.5"/>
      <circle cx="872" cy="116" r="5"/>
      <circle cx="1064" cy="70" r="4.5"/>
      <circle cx="862" cy="205" r="5"/>
      <circle cx="1096" cy="196" r="4.5"/>
    </g>

    <!-- ===== sea ===== -->
    <path d="M0,238 Q300,222 600,238 T1200,240 V340 H0 Z" fill="url(#sea)"/>
    <!-- moon reflection -->
    <g fill="#f4e4b0" opacity="0.16">
      <rect x="958" y="250" width="60" height="4" rx="2"/>
      <rect x="948" y="266" width="80" height="4" rx="2"/>
      <rect x="962" y="282" width="52" height="4" rx="2"/>
      <rect x="944" y="298" width="88" height="4" rx="2"/>
    </g>
    <!-- wave strokes -->
    <g stroke="#3fd0c9" stroke-opacity="0.28" stroke-width="1.4" fill="none" stroke-linecap="round">
      <path d="M60,266 q22,-7 44,0 t44,0"/>
      <path d="M250,290 q22,-7 44,0 t44,0"/>
      <path d="M120,312 q22,-7 44,0 t44,0"/>
      <path d="M470,300 q22,-7 44,0 t44,0"/>
      <path d="M650,284 q22,-7 44,0 t44,0"/>
    </g>

    <!-- ===== the ship (Going Merry-esque caravel silhouette) sailing past the moon ===== -->
    <g transform="translate(946,150)" filter="url(#sh)">
      <!-- hull -->
      <path d="M-60,74 L60,74 Q52,104 34,104 L-34,104 Q-52,104 -60,74 Z" fill="#0c1a26"/>
      <path d="M-60,74 L60,74 L54,82 L-54,82 Z" fill="#163247"/>
      <!-- masts -->
      <rect x="-2" y="-52" width="4" height="126" fill="#0c1a26"/>
      <!-- main sail -->
      <path d="M0,-46 Q42,-20 34,42 L0,34 Z" fill="#eef1f4"/>
      <path d="M0,-46 Q-42,-20 -34,42 L0,34 Z" fill="#d5dae0"/>
      <!-- sail emblem: red band -->
      <path d="M-38,10 Q0,20 34,12 L33,20 Q0,28 -37,18 Z" fill="#c0392b" opacity="0.85"/>
      <!-- flag -->
      <path d="M2,-52 L34,-46 L2,-40 Z" fill="#c0392b"/>
    </g>

    <!-- ===== straw hat accent (top-left of text) ===== -->
    <g transform="translate(96,66)">
      <ellipse cx="0" cy="10" rx="34" ry="10" fill="#e8c56a"/>
      <ellipse cx="0" cy="10" rx="34" ry="10" fill="none" stroke="#b9902f" stroke-width="1.5"/>
      <path d="M-19,10 Q-19,-12 0,-13 Q19,-12 19,10 Z" fill="#eccb74"/>
      <path d="M-19,6 Q0,12 19,6 L19,10 Q0,16 -19,10 Z" fill="#c0392b"/>
      <ellipse cx="0" cy="-13" rx="19" ry="6" fill="#e8c56a"/>
    </g>

    <!-- ===== text ===== -->
    <text x="150" y="118" font-size="54" font-weight="800" fill="#f5f6f8" letter-spacing="0.5">Németh Máté</text>
    <text x="150" y="152" font-size="21" font-weight="700" fill="url(#gold)">BME VIK &#8226; Mérnökinformatikus hallgató</text>

    <text x="150" y="196" font-size="16.5" fill="#aeb7c2">Gépi tanulás &#8226; játékfejlesztés &#8226; rendszertervezés</text>
    <text x="150" y="222" font-size="16.5" fill="#aeb7c2">Python &#183; Java &#183; C++ &#183; C#</text>

    <rect x="150" y="246" width="176" height="30" rx="15" fill="none" stroke="url(#gold)" stroke-opacity="0.7" stroke-width="1.3"/>
    <text x="238" y="266" font-size="13.5" fill="#f4d67e" text-anchor="middle" font-weight="700" letter-spacing="1">⚓ GITHUB.COM/NEMMATEE</text>
  </g>
</svg>
